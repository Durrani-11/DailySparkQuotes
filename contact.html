<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - DailySpark</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 40px 20px; line-height: 1.6; color: #333; }
        h1 { color: #d4a574; }
        a { color: #d4a574; }
        .contact-form { background: #f5f5f5; padding: 30px; border-radius: 12px; margin-top: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #d4a574; color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Contact Us</h1>
    <p>Have suggestions or want to submit a quote? Reach out!</p>
    
    <div class="contact-form">
        <form onsubmit="event.preventDefault(); alert('Thanks! We will get back to you soon.');">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>
    
    <p style="margin-top:30px;">Email: <a href="mailto:contact@dailyspark.com">contact@dailyspark.com</a></p>
    
    <p style="margin-top:40px;"><a href="index.html">← Back to Home</a></p>
</body>
</html>
